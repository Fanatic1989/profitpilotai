<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      background-image: url("/static/background.jpg");
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .dashboard-container {
      max-width: 800px;
      margin: 60px auto;
      padding: 30px;
      background: rgba(0, 0, 0, 0.85);
      color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
    }
    .dashboard-container h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #00ffff;
    }
    .info-section p {
      margin: 6px 0;
      font-size: 15px;
    }
    .settings-form label {
      display: block;
      margin: 12px 0 6px;
      color: #ffcc00;
    }
    .settings-form select, .settings-form input {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: none;
      background-color: #222;
      color: #fff;
    }
    .tooltip {
      display: inline-block;
      position: relative;
      cursor: pointer;
      color: #00ffff;
      margin-left: 5px;
    }
    .tooltip:hover::after {
      content: attr(data-tip);
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      top: -5px;
      left: 105%;
      white-space: pre-wrap;
      z-index: 10;
      width: 200px;
    }
    .settings-form button {
      margin-top: 20px;
      width: 100%;
      background-color: #00cc66;
      border: none;
      padding: 10px;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .settings-form button:hover {
      background-color: #00994d;
    }
    .trade-summary {
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 6px;
    }
    .logout-button {
      text-align: center;
      margin-top: 30px;
    }
    .logout-button a {
      background-color: #ff4444;
      color: white;
      text-decoration: none;
      padding: 10px 25px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .logout-button a:hover {
      background-color: #cc0000;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h1>📊 User Dashboard</h1>

    <div class="info-section">
      <p><strong>Login ID:</strong> {{ user.login_id }}</p>
      <p><strong>Bot Token:</strong> {{ user.bot_token }}</p>
    </div>

    <form method="post" action="/update-settings" class="settings-form">
      <label for="method">Trading Method</label>
      <select name="method" id="method">
        <option value="Forex">Forex</option>
        <option value="Binary">Binary</option>
      </select>

      <label for="strategy">Strategy 
        <span class="tooltip" data-tip="Scalping: Fast trades\nDay Trading: Trades within a day\nSwing Trading: Holding trades for days/weeks">ℹ</span>
      </label>
      <select name="strategy" id="strategy">
        <option value="Scalping">Scalping</option>
        <option value="Day Trading">Day Trading</option>
        <option value="Swing Trading">Swing Trading</option>
      </select>

      <label for="risk">Risk Percent</label>
      <select name="risk" id="risk">
        <option value="1">1%</option>
        <option value="2">2%</option>
        <option value="3">3%</option>
        <option value="4">4%</option>
        <option value="5">5%</option>
      </select>

      <label for="pairs">Trading Pairs (Multi-select or All)</label>
      <select name="pairs" id="pairs" multiple>
        {% for pair in deriv_pairs %}
          <option value="{{ pair }}">{{ pair }}</option>
        {% endfor %}
      </select>

      <label for="password">Change Password</label>
      <input type="password" name="password" placeholder="Enter new password">

      <button type="submit">💾 Save Settings</button>
    </form>

    <div class="trade-summary">
      <p><strong>Total Wins:</strong> {{ user.total_wins }}</p>
      <p><strong>Total Losses:</strong> {{ user.total_losses }}</p>
      <p><strong>Total Draws:</strong> {{ user.total_draws }}</p>
    </div>

    <div class="logout-button">
      <a href="/logout">🔒 Logout</a>
    </div>
  </div>
</body>
</html>
