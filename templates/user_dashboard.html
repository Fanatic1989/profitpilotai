<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-image: url("/static/background.jpg");
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .dashboard-container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00ffff;
    }
    .info-section p {
      margin: 6px 0;
      font-size: 15px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      color: #ffcc00;
    }
    select, input {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: none;
      background-color: #222;
      color: #fff;
    }
    .tooltip {
      display: inline-block;
      position: relative;
      cursor: pointer;
      color: #00ffff;
      margin-left: 5px;
    }
    .tooltip:hover::after {
      content: attr(data-tip);
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      top: -5px;
      left: 105%;
      white-space: pre-wrap;
      z-index: 10;
      width: 200px;
    }
    button {
      margin-top: 15px;
      width: 100%;
      background-color: #00cc66;
      border: none;
      padding: 10px;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #00994d;
    }
    .pair-select-buttons {
      margin-bottom: 10px;
    }
    .pair-select-buttons button {
      margin-right: 10px;
      padding: 5px 10px;
      background-color: #0099cc;
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pair-select-buttons button:hover {
      background-color: #006699;
    }
    .trade-summary {
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 6px;
    }
    .logout-button {
      text-align: center;
      margin-top: 20px;
    }
    .logout-button a {
      background-color: #ff4444;
      color: white;
      text-decoration: none;
      padding: 10px 25px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .logout-button a:hover {
      background-color: #cc0000;
    }
    .bot-controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .bot-controls button {
      flex: 1;
      min-width: 100px;
    }
    .notification {
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      display: none;
    }
    .success { background: #00cc66; }
    .error { background: #cc0000; }
    @media (max-width: 600px) {
      .dashboard-container {
        margin: 10px;
        padding: 15px;
      }
    }
  </style>
  <script>
    function selectAllPairs(selectBox, selectAll) {
      for (let option of selectBox.options) {
        option.selected = selectAll;
      }
    }

    function showNotification(type, message) {
      const notif = document.getElementById('notification');
      notif.className = 'notification ' + type;
      notif.innerText = message;
      notif.style.display = 'block';
      setTimeout(() => notif.style.display = 'none', 3000);
    }

    async function fetchLivePrices() {
      const elements = document.querySelectorAll('[data-symbol]');
      for (let el of elements) {
        let symbol = el.getAttribute('data-symbol');
        try {
          let res = await fetch(`/price/${symbol}`);
          let data = await res.json();
          el.innerText = data.price ?? 'N/A';
        } catch {
          el.innerText = 'Error';
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchLivePrices();
      setInterval(fetchLivePrices, 5000);
    });
  </script>
</head>
<body>
  <div class="dashboard-container">
    <h1>📊 User Dashboard</h1>

    <div id="notification"></div>

    <div class="info-section">
      <p><strong>Login ID:</strong> {{ user.login_id }}</p>
      <p><strong>Bot Token:</strong> {{ user.bot_token }}</p>
    </div>

    <form method="post" action="/update-settings" class="settings-form">
      <label for="trading_type">Trading Method 
        <span class="tooltip" data-tip="Choose whether to trade Forex or Binary options.">ℹ</span>
      </label>
      <select name="trading_type" id="trading_type" required>
        <option value="Forex" {% if user.trading_type == 'Forex' %}selected{% endif %}>Forex</option>
        <option value="Binary" {% if user.trading_type == 'Binary' %}selected{% endif %}>Binary</option>
      </select>

      <label for="strategy">Strategy 
        <span class="tooltip" data-tip="Scalping: Fast trades\nDay Trading: Trades within a day\nSwing Trading: Holding trades for days/weeks">ℹ</span>
      </label>
      <select name="strategy" id="strategy" required>
        <option value="Scalping" {% if user.strategy == 'Scalping' %}selected{% endif %}>Scalping</option>
        <option value="Day Trading" {% if user.strategy == 'Day Trading' %}selected{% endif %}>Day Trading</option>
        <option value="Swing Trading" {% if user.strategy == 'Swing Trading' %}selected{% endif %}>Swing Trading</option>
      </select>

      <label for="risk_percent">Risk Percent 
        <span class="tooltip" data-tip="Percentage of your balance you are willing to risk per trade.">ℹ</span>
      </label>
      <select name="risk_percent" id="risk_percent" required>
        {% for i in range(1,6) %}
          <option value="{{ i }}" {% if user.risk_percent == i %}selected{% endif %}>{{ i }}%</option>
        {% endfor %}
      </select>

      <label for="pairs">Trading Pairs (Multi-select or All)</label>
      <div class="pair-select-buttons">
        <button type="button" onclick="selectAllPairs(document.getElementById('pairs'), true)">Select All</button>
        <button type="button" onclick="selectAllPairs(document.getElementById('pairs'), false)">Deselect All</button>
      </div>
      <select name="pairs" id="pairs" multiple size="8">
        {% for pair in deriv_pairs %}
          <option value="{{ pair }}" {% if pair in user.pairs %}selected{% endif %}>{{ pair }} - <span data-symbol="{{ pair }}">Loading...</span></option>
        {% endfor %}
      </select>

      <label for="password">Change Password 
        <span class="tooltip" data-tip="Optional: Update your account password here.">ℹ</span>
      </label>
      <input type="password" name="password" placeholder="Enter new password">

      <button type="submit" onclick="showNotification('success', 'Settings saved successfully!')">💾 Save Settings</button>
    </form>

    <div class="bot-controls">
      <button onclick="fetch('/bot/start')">▶ Start Bot</button>
      <button onclick="fetch('/bot/pause')">⏸ Pause Bot</button>
      <button onclick="fetch('/bot/stop')">⏹ Stop Bot</button>
    </div>

    <div class="trade-summary">
      <p><strong>Total Wins:</strong> {{ user.total_wins }}</p>
      <p><strong>Total Losses:</strong> {{ user.total_losses }}</p>
      <p><strong>Total Draws:</strong> {{ user.total_draws }}</p>
    </div>

    <div class="logout-button">
      <a href="/logout">🔒 Logout</a>
    </div>
  </div>
</body>
</html>
